name: agentify-logistics-backend

services:
  agentify-logistics-api:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://agentify:agentify@host.docker.internal:5443/agentify}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8766}:8766"
    volumes:
      - agentify-logistics-storage:/app/storage
    networks:
      - agentify-logistics-app

networks:
  agentify-logistics-app:
    name: agentify-logistics-app-net
    driver: bridge

volumes:
  agentify-logistics-storage:
