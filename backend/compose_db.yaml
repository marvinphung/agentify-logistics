name: agentify-logistics-db

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentify-logistics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentify
      POSTGRES_PASSWORD: agentify
      POSTGRES_DB: agentify
    ports:
      - "127.0.0.1:5443:5432"
    volumes:
      - agentify_logistics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentify -d agentify"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agentify_logistics_postgres_data:
